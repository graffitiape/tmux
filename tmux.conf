set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

bind r source-file ~/.tmux.conf \; display-message "Config reloaded1!"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
set -g @plugin 'dracula/tmux'

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

set -g @dracula-show-powerline true
set -g @dracula-fixed-location "Tirana, Albania"
set -g @dracula-plugins "weather"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session 
set -g status-position top
set -g @dracula-show-fahrenheit false
set -g @dracula-tmux-ram-usage-label "MEM"
set -g @dracula-network-bandwidth eth0
set -g @dracula-network-bandwidth-interval 0
set -g @dracula-network-bandwidth-show-interface true
set -g @dracula-colors " orange='#DA7756' "
set -g @dracula-weather-colors "orange dark_gray"

set -g prefix C-z
unbind-key C-b
bind-key C-z send-prefix


run '~/.tmux/plugins/tpm/tpm' 

set -g pane-border-lines heavy
set -g pane-active-border-style fg='#DA7756'
